role: "AI 行业观察者"
role_context: "主要以个人视角持续关注 AI 行业动态，重点跟踪大模型、AI 产品、Agent、编程工具、开源模型、应用落地以及国内外厂商变化。"

topics:
  - name: "大模型与模型能力演进"
    priority: high
    keywords:
      cn:
        - "大模型"
        - "基础模型"
        - "多模态模型"
        - "推理模型"
        - "模型能力"
        - "长上下文"
        - "OpenAI"
        - "Anthropic"
      en:
        - "large language model"
        - "foundation model"
        - "multimodal model"
        - "reasoning model"
        - "model capability"
        - "long context"
        - "OpenAI"
        - "Anthropic"

  - name: "AI 产品与应用落地"
    priority: high
    keywords:
      cn:
        - "AI 产品"
        - "AI 应用"
        - "应用落地"
        - "商业化"
        - "工作流"
        - "企业 AI"
        - "用户增长"
        - "产品发布"
      en:
        - "AI product"
        - "AI application"
        - "production deployment"
        - "commercialization"
        - "workflow"
        - "enterprise AI"
        - "user growth"
        - "product launch"

  - name: "Agent 与自动化"
    priority: high
    keywords:
      cn:
        - "Agent"
        - "智能体"
        - "AI Agent"
        - "自动化"
        - "多代理"
        - "任务编排"
        - "工具调用"
        - "自主执行"
      en:
        - "Agent"
        - "AI agent"
        - "autonomous agent"
        - "automation"
        - "multi-agent"
        - "task orchestration"
        - "tool use"
        - "autonomous execution"

  - name: "AI 编程工具"
    priority: high
    keywords:
      cn:
        - "AI 编程"
        - "编程工具"
        - "代码助手"
        - "Cursor"
        - "Copilot"
        - "Claude Code"
        - "Codex"
        - "开发效率"
      en:
        - "AI coding"
        - "coding assistant"
        - "code generation"
        - "Cursor"
        - "GitHub Copilot"
        - "Claude Code"
        - "Codex"
        - "developer productivity"

  - name: "开源模型与开源生态"
    priority: medium
    keywords:
      cn:
        - "开源模型"
        - "开源 AI"
        - "模型开源"
        - "权重开放"
        - "推理框架"
        - "Hugging Face"
      en:
        - "open source model"
        - "open-source AI"
        - "open weights"
        - "model release"
        - "inference framework"
        - "Hugging Face"

  - name: "国内外厂商动态"
    priority: medium
    keywords:
      cn:
        - "厂商动态"
        - "AI 公司"
        - "国内 AI"
        - "海外 AI"
        - "产品更新"
        - "融资并购"
      en:
        - "vendor update"
        - "AI company"
        - "China AI"
        - "global AI"
        - "product update"
        - "funding acquisition"

exclude_topics:
  - "不与 AI 相关的内容"

sources:
  platforms:
    cn:
      - name: "微博"
        opencli: "weibo"
        commands:
          - "hot --limit 30"
          - "search \"{keyword}\" --limit 10"
        login_required: partial
      - name: "小红书"
        opencli: "xiaohongshu"
        commands:
          - "search \"{keyword}\" --limit 10"
          - "feed --limit 10"
        login_required: yes
      - name: "B站"
        opencli: "bilibili"
        commands:
          - "hot --limit 20"
          - "search \"{keyword}\" --limit 10"
        login_required: partial
      - name: "知乎"
        opencli: "zhihu"
        commands:
          - "hot --limit 20"
          - "search \"{keyword}\""
        login_required: partial
      - name: "即刻"
        opencli: "jike"
        commands:
          - "search \"{keyword}\""
          - "feed"
        login_required: yes
      - name: "V2EX"
        opencli: "v2ex"
        commands:
          - "hot"
          - "latest"
        login_required: no
      - name: "36氪"
        opencli: "36kr"
        commands:
          - "hot"
          - "search \"{keyword}\""
          - "news"
        login_required: no
    global:
      - name: "Twitter/X"
        opencli: "twitter"
        commands:
          - "search \"{keyword}\" --limit 15 --filter top"
          - "trending --limit 20"
        login_required: yes
      - name: "Reddit"
        opencli: "reddit"
        commands:
          - "search \"{keyword}\" --sort relevance --time week --limit 15"
          - "hot --limit 20"
        login_required: no
      - name: "Hacker News"
        opencli: "hackernews"
        commands:
          - "top"
          - "search \"{keyword}\""
          - "new"
        login_required: no
      - name: "YouTube"
        opencli: "youtube"
        commands:
          - "search \"{keyword}\""
          - "transcript \"{url}\""
        login_required: no
      - name: "arXiv"
        opencli: "arxiv"
        commands:
          - "search \"{keyword}\""
        login_required: no
      - name: "Product Hunt"
        opencli: "producthunt"
        commands:
          - "hot"
          - "today"
        login_required: no
      - name: "Reuters"
        opencli: "reuters"
        commands:
          - "search \"{keyword}\""
        login_required: no
  websites:
    cn:
      - name: "机器之心"
        url: "https://www.jiqizhixin.com/"
        type: "media"
      - name: "量子位"
        url: "https://www.qbitai.com/"
        type: "media"
      - name: "InfoQ AI"
        url: "https://www.infoq.cn/topic/AI"
        type: "media"
    global:
      - name: "OpenAI News"
        url: "https://openai.com/news/"
        type: "official"
      - name: "Anthropic News"
        url: "https://www.anthropic.com/news"
        type: "official"
      - name: "TechCrunch"
        url: "https://techcrunch.com/"
        type: "media"
      - name: "The Verge"
        url: "https://www.theverge.com/"
        type: "media"

collection:
  window_days: 3
  priority_order:
    - "官方确认信息"
    - "高讨论度社区信号"
    - "开源与开发者实践"
    - "背景性报道"
  exclude_rules:
    - "纯搬运无信息增量"
    - "无来源的情绪内容"
    - "弱相关泛热点"
    - "旧闻翻炒"

daily:
  max_items: 15
  summary_style: "detailed"
  include_actions: true
  include_trends: true
  language: "zh-CN"

pipeline:
  search_preference: "opencli-first"
  fallback_search_tools:
    - "web_search"
    - "web_fetch"
  fallback_requires_reason: true

server:
  host: "0.0.0.0"
  timeout_hours: 2
  port: 17890

feishu:
  group_id: ""
  tools:
    wiki_list: ""
    doc_read: ""
    chat_messages: ""
