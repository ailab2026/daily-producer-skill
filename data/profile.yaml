role: "AI 从业者"
role_context: "同时关注大模型、AI 编程、Agent、AI 产品、开源模型与企业落地，需要兼顾产品、技术和行业应用信号。"

topics:
  - name: "大模型"
    priority: high
    keywords:
      - "大模型"
      - "基础模型"
      - "多模态模型"
      - "推理模型"
      - "长上下文"
      - "OpenAI"
      - "Anthropic"
      - "Gemini"
      - "GPT-5"
      - "Claude"
      - "Llama"
      - "Qwen"
  - name: "AI 编程"
    priority: high
    keywords:
      - "AI 编程"
      - "代码生成"
      - "编程助手"
      - "Codex"
      - "Claude Code"
      - "Cursor"
      - "Windsurf"
      - "GitHub Copilot"
      - "Aider"
      - "OpenCode"
      - "code agent"
      - "agentic coding"
  - name: "Agent"
    priority: high
    keywords:
      - "Agent"
      - "AI Agent"
      - "multi-agent"
      - "agent framework"
      - "tool use"
      - "computer use"
      - "workflow automation"
      - "OpenAI Agents"
      - "LangGraph"
      - "AutoGen"
      - "CrewAI"
      - "Manus"
  - name: "AI 产品"
    priority: medium
    keywords:
      - "AI 产品"
      - "AI 应用"
      - "AI 搜索"
      - "AI 助手"
      - "AI 浏览器"
      - "Perplexity"
      - "ChatGPT"
      - "Claude app"
      - "Midjourney"
      - "Runway"
  - name: "开源模型"
    priority: medium
    keywords:
      - "开源模型"
      - "open-weight model"
      - "open source llm"
      - "Llama"
      - "Mistral"
      - "Qwen open"
      - "DeepSeek"
      - "vLLM"
      - "Ollama"
      - "SGLang"
  - name: "企业落地"
    priority: medium
    keywords:
      - "企业落地"
      - "AI 商业化"
      - "生产环境部署"
      - "企业知识库"
      - "RAG"
      - "AI workflow"
      - "AI ROI"
      - "copilot for enterprise"
      - "vertical AI"
      - "LLMOps"

exclude_topics:
  - "和 AI 无关的泛科技新闻"

sources:
  platforms:
    cn:
      - name: "微博"
        opencli: "weibo"
        commands:
          - "hot --limit 30"
          - "search \"{keyword}\" --limit 10"
        login_required: partial
      - name: "小红书"
        opencli: "xiaohongshu"
        commands:
          - "search \"{keyword}\" --limit 10"
          - "feed --limit 10"
        login_required: yes
      - name: "B站"
        opencli: "bilibili"
        commands:
          - "hot --limit 20"
          - "search \"{keyword}\" --limit 10"
        login_required: partial
      - name: "知乎"
        opencli: "zhihu"
        commands:
          - "hot --limit 20"
          - "search \"{keyword}\""
        login_required: partial
      - name: "V2EX"
        opencli: "v2ex"
        commands:
          - "hot"
          - "latest"
        login_required: no
    global:
      - name: "Twitter/X"
        opencli: "twitter"
        commands:
          - "search \"{keyword}\" --limit 15 --filter top"
          - "trending --limit 20"
        login_required: yes
      - name: "Reddit"
        opencli: "reddit"
        commands:
          - "search \"{keyword}\" --sort relevance --time week --limit 15"
          - "hot --limit 20"
        login_required: no
      - name: "Hacker News"
        opencli: "hackernews"
        commands:
          - "top"
          - "search \"{keyword}\""
          - "new"
        login_required: no
      - name: "YouTube"
        opencli: "youtube"
        commands:
          - "search \"{keyword}\""
          - "transcript \"{url}\""
        login_required: no
      - name: "arXiv"
        opencli: "arxiv"
        commands:
          - "search \"{keyword}\""
        login_required: no
  websites:
    cn:
      - name: "机器之心"
        url: "https://www.jiqizhixin.com/"
        type: "media"
      - name: "量子位"
        url: "https://www.qbitai.com/"
        type: "media"
      - name: "InfoQ AI"
        url: "https://www.infoq.cn/topic/AI"
        type: "media"
    global:
      - name: "OpenAI News"
        url: "https://openai.com/news/"
        type: "official"
      - name: "Anthropic News"
        url: "https://www.anthropic.com/news"
        type: "official"
      - name: "TechCrunch AI"
        url: "https://techcrunch.com/category/artificial-intelligence/"
        type: "media"

collection:
  window_days: 3
  priority_order:
    - "官方确认信息"
    - "高讨论度社区信号"
    - "开源与开发者实践"
    - "背景性报道"
  exclude_rules:
    - "纯搬运无信息增量"
    - "无来源的情绪内容"
    - "弱相关泛热点"
    - "旧闻翻炒"

daily:
  max_items: 15
  summary_style: "detailed"
  include_actions: true
  include_trends: true
  language: "zh-CN"

pipeline:
  search_preference: "opencli-first"
  fallback_search_tools:
    - "web_search"
    - "web_fetch"
  fallback_requires_reason: true

server:
  host: "0.0.0.0"
  timeout_hours: 2
  port: 17890

feishu:
  group_id: ""
  tools:
    wiki_list: ""
    doc_read: ""
    chat_messages: ""
