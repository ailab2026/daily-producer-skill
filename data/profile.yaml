role: "AI 产品经理"
role_context: "负责 AI 产品规划与落地，关注模型能力变化、AI coding 工作流、Agent 生态以及头部模型厂商的产品动作，希望快速掌握可转化为产品决策的信号。"

topics:
  - name: "AI coding"
    priority: high
    keywords:
      - "AI coding"
      - "coding agent"
      - "agentic coding"
      - "devtool"
      - "代码生成"
      - "编程助手"
      - "Copilot"
