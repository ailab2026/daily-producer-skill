collection_contract:
  window_days: 3
  must_cover:
    - "头部模型厂商最新动态"
    - "AI coding 与 agent 产品更新"
    - "社区反馈与开发者讨论变化"
    - "开源生态与 GitHub 热点"
    - "定价、规则或平台能力变化"
  required_platforms:
    official:
      cn:
        - "微信公众号"
        - "量子位公众号"
        - "机器之心"
        - "相关官网与发布页"
      global:
        - "OpenAI 官方"
        - "Anthropic 官方"
    community:
      cn:
        - "微博"
        - "即刻"
        - "小红书"
      global:
        - "X"
        - "Reddit"
        - "GitHub"
    media:
      cn:
        - "少数派"
        - "机器之心"
        - "量子位"
      global:
        - "TechCrunch"
        - "The Verge"
        - "Hacker News"
  priority_order:
    - "官方确认信息"
    - "高讨论度社区信号"
    - "开源与开发者实践"
    - "背景性报道"
  selection_rules:
    include:
      - "最近 3 天内"
      - "与画像强相关"
      - "有明确来源链接"
      - "有真实影响或高讨论度"
      - "优先多源交叉验证"
    exclude:
      - "纯搬运"
      - "无信息增量的情绪内容"
      - "弱相关泛热点"
      - "旧闻翻炒"
      - "无关 AI 的内容"
  execution_hint:
    - "每轮先建候选池，再少量深抓"
    - "优先覆盖官方源与核心社区源"
    - "sources 必须区分 cn 和 global，并满足来源数量与关键词数量要求"
    - "若发生 fallback，必须在 raw 留痕里写明 fallback_reason"
    - "若某源未采集，需说明是未执行、未命中还是不可用"
    - "日报正文需明确区分：官方事实、社区讨论、媒体解读"
