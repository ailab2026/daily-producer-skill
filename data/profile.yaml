      - "AI Agent"
      - "智能体"
      - "workflow"
      - "tool use"
      - "multi-agent"
      - "agent framework"
      - "automation"
      - "agent memory"
      - "agent infra"
  - name: "OpenAI / Anthropic"
    priority: high
    keywords:
      - "OpenAI"
      - "Anthropic"
      - "GPT"
      - "Claude"
      - "model release"
      - "API"
      - "Responses API"
      - "function calling"
      - "pricing"
      - "safety"
  - name: "AI 产品与生态"
    priority: medium
    keywords:
      - "AI 产品"
      - "AI 应用"
      - "developer tools"
      - "LLM"
      - "推理模型"
      - "开源模型"
      - "product update"
      - "benchmark"
      - "prompt"
      - "工作流"

exclude_topics:
  - "无关 AI 的内容"
  - "纯泛科技但不涉及 AI 的内容"
  - "无实质信息增量的转载"
  - "纯营销稿"
  - "旧闻翻炒"

daily:
  max_items: 15
  summary_style: "detailed"
  include_actions: true
  include_trends: true
  language: "zh-CN"
  publish_root: "/root/.openclaw/workspaces/daily-producer-isolated/output"
  public_base_url: "http://47.237.109.132"
  public_daily_path: "/daily/{date}.html"

pipeline:
  owner: "daily-producer"
  mode: "producer-owned"
  profile_required: true
  feedback_window_days: 7
  collection_window_days: 3
  search_preference: "agent-reach"
  content_fetch_preference: "agent-reach"
  fallback_search_tools:
    - "web_search"
    - "web_fetch"
  fallback_requires_reason: true
  steps:
    - "check_profile"
    - "load_recent_feedback"
    - "collect_index_candidates"
    - "collect_detail_for_selected"
    - "compose_payload_json"
    - "render_daily_html"
    - "render_site_index"
    - "serve_from_output_root"
  outputs:
    json: "output/daily/{date}.json"
    html: "output/daily/{date}.html"
    index: "output/index.html"
    raw_index: "output/raw/{date}_index.txt"
    raw_detail: "output/raw/{date}_detail.txt"
    feedback: "data/feedback/{date}.json"
  rendering:
    single_page_visual_baseline: "reference/daily_example.html"
    renderer: "scripts/render_daily.py"
    index_renderer: "scripts/render_index.py"
  publishing:
    output_root_is_public_root: true
    require_index_refresh: true
    require_daily_refresh: true
    port_80_serves_publish_root: true
    archive_previous_html: true
    archive_dir: "output/archive"
    archive_name_format: "{year-month-day-hour-min}.html"

server:
  host: "0.0.0.0"
  timeout_hours: 2
  port: 17890

